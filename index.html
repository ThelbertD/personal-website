<script>
const { useState, useEffect, useRef } = React;
const h = React.createElement;

const PORTFOLIO_URL = 'https://drive.google.com/drive/folders/1h8Z6_MNBSo390TjfG3YuLtu3iBedoGRt?usp=sharing';

/* ── Scroll animation hook ── */
function useScrollReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('[data-scroll]');
    const obs = new IntersectionObserver(entries => entries.forEach(e => {
      if (e.isIntersecting) e.target.classList.add('in-view');
    }), { threshold: 0.12 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

/* ── Typewriter hook ── */
function useTypewriter(words, speed = 85, pause = 1500) {
  const [text, setText] = useState('');
  const [i, setI] = useState(0);
  const [deleting, setDeleting] = useState(false);
  useEffect(() => {
    const current = words[i % words.length];
    let t;
    if (!deleting && text === current) {
      t = setTimeout(() => setDeleting(true), pause);
    } else if (deleting && text === '') {
      setDeleting(false);
      setI(v => v + 1);
    } else {
      t = setTimeout(() => {
        setText(deleting ? current.slice(0, text.length - 1) : current.slice(0, text.length + 1));
      }, deleting ? speed / 2 : speed);
    }
    return () => clearTimeout(t);
  }, [text, deleting, i]);
  return text;
}

/* ── Constellation particle background (full-site, cursor-aware) ── */
function BackgroundParticles() {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    const LINKD = 150;   // particle-to-particle link distance
    const MOUSED = 220;  // cursor influence radius
    let w = 0, h = 0, raf = 0;
    const pts = [];
    const mouse = { x: null, y: null };
    function resize() {
      w = window.innerWidth; h = window.innerHeight;
      canvas.width = w * DPR; canvas.height = h * DPR;
      canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    function seed() {
      pts.length = 0;
      const n = Math.max(45, Math.min(130, Math.floor(w * h / 15000)));
      for (let i = 0; i < n; i++) {
        pts.push({
          x: Math.random() * w, y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3
        });
      }
    }
    function tick() {
      ctx.clearRect(0, 0, w, h);
      for (const p of pts) {
        if (mouse.x != null) {
          const dx = mouse.x - p.x, dy = mouse.y - p.y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < MOUSED && d > 0.5) {
            const f = (1 - d / MOUSED) * 0.04;   // gentle pull toward cursor
            p.vx += (dx / d) * f; p.vy += (dy / d) * f;
          }
        }
        p.x += p.vx; p.y += p.vy;
        p.vx *= 0.985; p.vy *= 0.985;            // friction so they settle
        // keep a little baseline drift
        if (Math.abs(p.vx) < 0.06) p.vx += (Math.random() - 0.5) * 0.04;
        if (Math.abs(p.vy) < 0.06) p.vy += (Math.random() - 0.5) * 0.04;
        if (p.x < 0 || p.x > w) p.vx *= -1;
        if (p.y < 0 || p.y > h) p.vy *= -1;
        p.x = Math.max(0, Math.min(w, p.x));
        p.y = Math.max(0, Math.min(h, p.y));
      }
      for (let i = 0; i < pts.length; i++) {
        for (let j = i + 1; j < pts.length; j++) {
          const a = pts[i], b = pts[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < LINKD) {
            ctx.strokeStyle = 'rgba(96,165,250,' + (0.14 * (1 - d / LINKD)) + ')';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
          }
        }
      }
      if (mouse.x != null) {
        for (const p of pts) {
          const dx = p.x - mouse.x, dy = p.y - mouse.y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < MOUSED) {
            ctx.strokeStyle = 'rgba(96,165,250,' + (0.32 * (1 - d / MOUSED)) + ')';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y); ctx.lineTo(mouse.x, mouse.y); ctx.stroke();
          }
        }
      }
      for (const p of pts) {
        ctx.fillStyle = 'rgba(147,197,253,0.7)';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.6, 0, Math.PI * 2);
        ctx.fill();
      }
      raf = requestAnimationFrame(tick);
    }
    resize(); seed(); tick();
    const onResize = () => { resize(); seed(); };
    const onMove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
    const onLeave = () => { mouse.x = null; mouse.y = null; };
    const onTouch = e => { if (e.touches[0]) { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; } };
    window.addEventListener('resize', onResize);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseout', onLeave);
    window.addEventListener('touchmove', onTouch, { passive: true });
    window.addEventListener('touchend', onLeave);
    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener('resize', onResize);
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseout', onLeave);
      window.removeEventListener('touchmove', onTouch);
      window.removeEventListener('touchend', onLeave);
    };
  }, []);
  return h('canvas', { ref, className: 'fixed inset-0 w-full h-full pointer-events-none', style: { zIndex: -1 }, 'aria-hidden': 'true' });
}

/* ── Small helpers ── */
function SectionHeading({ eyebrow, title, accent, sub }) {

/* ── Nav ── */
function Nav() {
  const [scrolled, setScrolled] = useState(false);
  const [open, setOpen] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 30);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);
  const links = ['About', 'Services', 'Experience', 'Projects', 'Testimonials'];
  const linkEl = (l, extra) => h('a', _link(l, extra), l);
  function _link(l, cls) {
    return {
      key: l, href: `#${l.toLowerCase()}`,
      className: cls || 'text-sm text-gray-400 font-medium hover:text-white transition-colors',
      onClick: () => setOpen(false)
    };
  }
  return h('nav', {
    className: `fixed inset-x-0 top-0 z-50 transition-all duration-300 ${scrolled ? 'bg-black/90 backdrop-blur-lg border-b border-white/10' : ''}`
  },
    h('div', { className: 'max-w-6xl mx-auto px-6 py-4 flex items-center justify-between' },
      h('a', { href: '#', className: 'flex items-center gap-2.5' },
        h('img', {
          src: 'images/td-logo.png', alt: 'Thelbert Desoloc logo',
          className: 'h-11 w-11 rounded-full object-cover ring-1 ring-blue-400/30 shadow-lg shadow-blue-900/30',
          onError: e => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'inline'; }
        }),
        h('span', { className: 'font-display text-xl font-bold text-white tracking-tight hidden' },
          'TD', h('span', { className: 'gradient-text' }, '.'))
      ),
      h('div', { className: 'hidden md:flex items-center gap-8' },
        links.map(l => linkEl(l)),
        h('a', { href: CALENDLY_URL, target: '_blank', rel: 'noopener noreferrer', className: 'spin-border gradient-bg text-white text-sm font-bold px-5 py-2.5 rounded-full btn-glow transition-all' }, "Let's Connect")
      ),
      h('button', { className: 'md:hidden text-white p-1', onClick: () => setOpen(!open) },
        h('svg', { width: 24, height: 24, fill: 'none', stroke: 'currentColor', strokeWidth: 2, viewBox: '0 0 24 24' },
          open
            ? h('path', { strokeLinecap: 'round', strokeLinejoin: 'round', d: 'M6 18L18 6M6 6l12 12' })
            : h('path', { strokeLinecap: 'round', strokeLinejoin: 'round', d: 'M4 6h16M4 12h16M4 18h16' })
        )
      )
    ),
    open && h('div', { className: 'md:hidden bg-[#0B0B0F] border-t border-white/10 px-6 py-5 flex flex-col gap-4' },
      links.map(l => linkEl(l, 'text-gray-300 text-sm font-medium')),
      h('a', { href: CALENDLY_URL, target: '_blank', rel: 'noopener noreferrer', className: 'spin-border gradient-bg text-white text-sm font-bold px-5 py-3 rounded-full text-center', onClick: () => setOpen(false) }, "Let's Connect")
    )
  );
}

/* ── Hero ── */
function Hero() {

/* ── Process ("Here Is What I Do") ── */

              h('p', { className: 'text-gray-300 text-base leading-snug' }, s)))),

              h('path', { d: 'M6 12v5c0 1 2.7 3 6 3s6-2 6-3v-5' })),
            'View Full Resume / CV'),

        h('button', { onClick: () => setOpen(false), 'aria-label': 'Close chat', className: 'text-white/70 hover:text-white transition-colors' },
          h('svg', { width: 20, height: 20, fill: 'none', stroke: 'currentColor', strokeWidth: 2.2, viewBox: '0 0 24 24' },
            h('path', { strokeLinecap: 'round', d: 'M6 18L18 6M6 6l12 12' })))
      ),
      /* body */
      h('div', { className: 'p-5 flex flex-col gap-4' },
        h('div', { className: 'msg-in flex gap-2.5 items-end' },
          h('div', { className: 'w-8 h-8 rounded-full gradient-bg flex items-center justify-center text-white flex-shrink-0' }, h(RobotIcon, { size: 18 })),
          h('div', { className: 'bg-white/[0.06] border border-white/10 rounded-2xl rounded-bl-sm px-4 py-3 text-gray-200 text-sm leading-relaxed' },
            'Hi! 👋 Want to automate and scale your business? The fastest way to start is a quick call — let me grab you a slot.')),
        h('a', {
          href: CALENDLY_URL, target: '_blank', rel: 'noopener noreferrer',
          className: 'spin-border gradient-bg text-white font-bold py-3.5 rounded-full text-sm btn-glow transition-all inline-flex items-center justify-center gap-2'
        },
          h('svg', { width: 16, height: 16, fill: 'none', stroke: 'currentColor', strokeWidth: 2, viewBox: '0 0 24 24' },
            h('rect', { x: 3, y: 4, width: 18, height: 18, rx: 2 }),
            h('line', { x1: 16, y1: 2, x2: 16, y2: 6 }),
            h('line', { x1: 8, y1: 2, x2: 8, y2: 6 }),
            h('line', { x1: 3, y1: 10, x2: 21, y2: 10 })),
          'Book a Call'),
        h('a', {
          href: 'mailto:desolocthelbert3@gmail.com', onClick: () => setOpen(false),
          className: 'spin-border text-white font-semibold py-3 rounded-full text-sm text-center hover:bg-white/5 transition-all'
        }, 'Or send a message')
      )
    ),
    h('button', {
      onClick: () => setOpen(o => !o),
      'aria-label': open ? 'Close chat' : 'Open chat',
      className: `spin-border chat-pulse w-16 h-16 rounded-full gradient-bg text-white flex items-center justify-center shadow-2xl shadow-blue-900/40 hover:scale-105 transition-transform ${open ? 'rotate-0' : ''}`
    },
      open
        ? h('svg', { width: 26, height: 26, fill: 'none', stroke: 'currentColor', strokeWidth: 2.4, viewBox: '0 0 24 24' }, h('path', { strokeLinecap: 'round', d: 'M6 18L18 6M6 6l12 12' }))
        : h(RobotIcon, { size: 28 })
    )
  );
}
